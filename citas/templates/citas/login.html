<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Salón de Belleza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background: white;
        }

        .btn-primary {
            background-color: #d63384;
            border: none;
            transition: 0.3s;
        }

            .btn-primary:hover {
                background-color: #b02a6a;
            }

        .brand-text {
            color: #d63384;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-card p-5">
        <div class="text-center mb-4">
            <h2 class="brand-text">Belleza & Estilo</h2>
            <p class="text-muted">Inicia sesión para gestionar tus citas</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} small">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
        </form>

        <div class="text-center mt-4">
            <p class="small">¿No tienes cuenta? <a href="{% url 'registro' %}" class="text-decoration-none">Regístrate aquí</a></p>
        </div>
    </div>
</body>
</html>
