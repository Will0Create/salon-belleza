<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Belleza & Estilo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background: white;
        }

        .btn-primary {
            background-color: #d63384;
            border: none;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

            .btn-primary:hover {
                background-color: #b02a6a;
                transform: translateY(-2px);
            }

        .brand-text {
            color: #d63384;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* Estilo para los inputs de Django */
        input {
            display: block;
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            border: 1px solid #ced4da;
            border-radius: 8px;
            transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        }

            input:focus {
                border-color: #d63384;
                outline: 0;
                box-shadow: 0 0 0 0.25rem rgba(214, 51, 132, 0.25);
            }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="brand-text">Belleza & Estilo</h2>
            <p class="text-muted">Gestión de Citas</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show small" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Usuario</label>
                {{ form.username }}
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Contraseña</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Entrar al Panel</button>
        </form>

        <div class="text-center mt-3 border-top pt-3">
            <p class="small mb-1">¿No tienes cuenta?</p>
            <a href="{% url 'registro' %}" class="text-decoration-none fw-bold" style="color: #d63384;">Regístrate aquí</a>
            <br>
            <a href="/" class="small text-muted text-decoration-none mt-2 d-inline-block">← Volver al inicio</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
